<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 320px;
        font-family:
          "Instrument Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: linear-gradient(135deg, #020617 0%, #020617 100%);
        color: #e5e7eb;
      }

      .container {
        padding: 16px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .logo {
        font-size: 18px;
        font-weight: 700;
        background: linear-gradient(135deg, #8b5cf6, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #94a3b8;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6b7280;
      }

      .status-dot.capturing {
        background: #22c55e;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .btn {
        width: 100%;
        padding: 12px 16px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s;
      }

      .btn-capture {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
      }

      .btn-capture:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
      }

      .btn-capture.capturing {
        background: linear-gradient(135deg, #22c55e, #16a34a);
      }

      .btn-capture.capturing:hover {
        box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
      }

      .actions-panel {
        margin-top: 16px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 8px;
        max-height: 300px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .actions-header {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .actions-title {
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .actions-count {
        background: rgba(139, 92, 246, 0.2);
        color: #a78bfa;
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 11px;
      }

      .btn-clear {
        background: transparent;
        border: none;
        color: #ef4444;
        font-size: 11px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 4px;
      }

      .btn-clear:hover {
        background: rgba(239, 68, 68, 0.1);
      }

      .actions-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
        max-height: 200px;
      }

      .action-item {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 6px;
        border-left: 3px solid #8b5cf6;
      }

      .action-item.click {
        border-left-color: #8b5cf6;
      }
      .action-item.scroll {
        border-left-color: #f59e0b;
      }
      .action-item.type {
        border-left-color: #22c55e;
      }
      .action-item.focus {
        border-left-color: #ec4899;
      }

      .action-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
      }

      .action-type {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .action-item.click .action-type {
        color: #8b5cf6;
      }
      .action-item.scroll .action-type {
        color: #f59e0b;
      }
      .action-item.type .action-type {
        color: #22c55e;
      }
      .action-item.focus .action-type {
        color: #ec4899;
      }

      .action-time {
        font-size: 10px;
        color: #6b7280;
      }

      .action-details {
        font-size: 11px;
        color: #94a3b8;
        font-family: monospace;
        word-break: break-all;
      }

      .action-details span {
        color: #a78bfa;
      }

      .empty-state {
        padding: 24px;
        text-align: center;
        color: #6b7280;
        font-size: 12px;
      }

      .login-prompt {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
        text-align: center;
      }

      .login-prompt-title {
        font-size: 14px;
        font-weight: 600;
        color: #ef4444;
        margin-bottom: 8px;
      }

      .login-prompt-text {
        font-size: 12px;
        color: #94a3b8;
        margin-bottom: 12px;
        line-height: 1.4;
      }

      .btn-login {
        background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        color: white;
        border: none;
        padding: 10px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: all 0.2s;
      }

      .btn-login:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
      }

      .auth-status {
        font-size: 11px;
        margin-top: 4px;
        font-weight: 500;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn:disabled:hover {
        transform: none;
        box-shadow: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">🎯 QAI Web Recorder</div>
      </div>

      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Ready</span>
      </div>
      <div class="auth-status" id="authStatus">Checking connection...</div>

      <div class="login-prompt" id="loginPrompt" style="display: none">
        <div class="login-prompt-title">🔒 Login Required</div>
        <div class="login-prompt-text">
          Please log in to QAI platform to use this extension. This extension is
          only available for QAI customers.
        </div>
        <button class="btn-login" id="loginBtn">Login to QAI Platform</button>
      </div>

      <button class="btn btn-capture" id="captureBtn">
        <span id="captureIcon">⏺️</span>
        <span id="captureText">Start Capturing</span>
      </button>

      <div class="actions-panel">
        <div class="actions-header">
          <div class="actions-title">
            📋 Actions
            <span class="actions-count" id="actionsCount">0</span>
          </div>
          <button class="btn-clear" id="clearBtn">Clear</button>
        </div>
        <div class="actions-list" id="actionsList">
          <div class="empty-state" id="emptyState">
            Click "Start Capturing" and interact with any webpage
          </div>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
